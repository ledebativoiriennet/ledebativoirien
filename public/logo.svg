<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <mask id="redMask">
      <rect width="100" height="100" fill="white" />
      <circle cx="55" cy="50" r="40" fill="black" />
    </mask>
    <mask id="blackMask">
      <rect width="100" height="100" fill="white" />
      <circle cx="45" cy="50" r="40" fill="black" />
    </mask>
  </defs>
  
  <!-- Croissant Rouge à gauche -->
  <circle cx="46" cy="50" r="46" fill="#ff0000" mask="url(#redMask)" />
  
  <!-- Croissant Noir à droite -->
  <circle cx="54" cy="50" r="46" fill="#000000" mask="url(#blackMask)" />
  
  <!-- Texte LDI au centre -->
  <text x="50" y="64" font-family="Arial, sans-serif" font-size="36" font-weight="900" text-anchor="middle" letter-spacing="1" fill="#000000">LDI</text>
</svg>
